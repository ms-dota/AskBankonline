<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AskBank - مكتبة البنوك</title>
  <link rel="icon" type="image/png" href="./assets/icon.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f0f0f0;
      --text: #1a1a1a;
      --muted: #666666;
      --border: #e0e0e0;
      --accent: #4a90e2;
      --accent-strong: #357abd;
      --accent-soft: rgba(74, 144, 226, .14);
      --quiz-btn: #2ecc71;
      --quiz-btn-hover: #27ae60;
      --gold: #b7791f;
      --gold-soft: #fef3c7;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --success: #15803d;
      --success-soft: #dcfce7;
      --shadow: 0 12px 30px rgba(15, 23, 42, .07);
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #1a1a1a;
      --surface: #1f1f1f;
      --surface-soft: #2d2d2d;
      --text: #ffffff;
      --muted: #b0b0b0;
      --border: #404040;
      --accent: #5ca3ff;
      --accent-strong: #8bbfff;
      --accent-soft: rgba(92, 163, 255, .14);
      --quiz-btn: #27ae60;
      --quiz-btn-hover: #2ecc71;
      --gold: #fbbf24;
      --gold-soft: rgba(251, 191, 36, .13);
      --danger: #f87171;
      --danger-soft: rgba(248, 113, 113, .14);
      --success: #4ade80;
      --success-soft: rgba(74, 222, 128, .13);
      --shadow: 0 12px 30px rgba(0, 0, 0, .24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, select { font: inherit; }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 10px 0 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      box-shadow: var(--shadow);
      object-fit: cover;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform .2s, border-color .2s, background .2s;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .hero {
      margin-bottom: 18px;
    }

    body.quiz-open {
      overflow: hidden;
      touch-action: none;
    }

    .intro, .toolbar, .course, .modal-card {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    [data-theme="dark"] .intro,
    [data-theme="dark"] .toolbar,
    [data-theme="dark"] .course,
    [data-theme="dark"] .modal-card {
      background: var(--surface-soft);
    }

    .intro {
      padding: 28px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 20px;
      align-items: center;
    }

    .hero-logo {
      width: clamp(76px, 12vw, 112px);
      height: clamp(76px, 12vw, 112px);
      border-radius: 18px;
      object-fit: cover;
      box-shadow: var(--shadow);
    }

    .intro-copy {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 13px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 6vw, 58px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .intro p {
      margin: 0;
      max-width: 62ch;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 14px;
      margin-bottom: 18px;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 0 12px;
    }

    .search-wrap input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      padding: 13px 0;
    }

    .select {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      min-width: 160px;
    }

    .courses {
      display: grid;
      gap: 14px;
    }

    .course { overflow: hidden; }

    .course-head {
      width: 100%;
      min-height: 74px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align: right;
    }

    .course-title {
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 0;
    }

    .course-title strong {
      font-size: 20px;
      overflow-wrap: anywhere;
    }

    .course-title span {
      color: var(--muted);
      font-size: 14px;
    }

    .chevron {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--accent-strong);
      background: var(--accent-soft);
      transition: transform .2s;
    }

    .course.open .chevron { transform: rotate(180deg); }

    .bank-list {
      display: none;
      padding: 0 20px 20px;
      gap: 10px;
    }

    .course.open .bank-list { display: grid; }

    .bank {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    .bank-main {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .bank-title {
      font-weight: 800;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .pill.essay {
      background: var(--gold-soft);
      color: var(--gold);
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
      transition: transform .2s, background .2s, border-color .2s;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn.primary {
      color: #fff;
      background: var(--accent);
    }

    .btn.success {
      color: #fff;
      background: var(--quiz-btn);
    }

    .btn.success:hover {
      background: var(--quiz-btn-hover);
    }

    .btn.danger {
      color: #fff;
      background: var(--danger);
    }

    .btn.selected {
      box-shadow: 0 0 0 3px var(--accent-soft);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .btn.secondary {
      color: var(--accent-strong);
      border-color: var(--border);
      background: var(--surface);
    }

    .btn.ghost {
      color: var(--muted);
      border-color: var(--border);
      background: transparent;
    }

    .empty {
      display: none;
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: var(--bg);
    }

    .modal.active { display: flex; }

    .modal-card {
      width: min(780px, 100%);
      height: min(92vh, 760px);
      background: var(--surface);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .modal-head, .modal-foot {
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .modal-foot {
      border-top: 1px solid var(--border);
      border-bottom: 0;
    }

    .modal-title {
      min-width: 0;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .modal-body {
      padding: 22px;
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .score-pill {
      background: var(--accent);
      color: #fff;
      font-size: 14px;
    }

    .mode-selection {
      display: grid;
      gap: 14px;
    }

    .mode-card {
      width: 100%;
      padding: 18px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      cursor: pointer;
      text-align: right;
      transition: border-color .2s, transform .2s, background .2s;
    }

    .mode-card:hover {
      border-color: var(--accent);
      background: var(--surface);
      transform: translateY(-1px);
    }

    .mode-card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 18px;
    }

    .mode-card span {
      color: var(--muted);
      line-height: 1.7;
    }

    .question {
      display: grid;
      gap: 18px;
    }

    .question h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.75;
      overflow-wrap: anywhere;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      min-height: 54px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 13px 15px;
      cursor: pointer;
      text-align: right;
      line-height: 1.55;
    }

    .option.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .option.correct {
      border-color: var(--success);
      background: var(--success-soft);
      color: var(--success);
      font-weight: 800;
    }

    .option.wrong {
      border-color: var(--danger);
      background: var(--danger-soft);
      color: var(--danger);
      font-weight: 800;
    }

    .answer-box {
      display: none;
      padding: 18px;
      border: 1px solid var(--success);
      border-radius: 8px;
      background: var(--success-soft);
      color: var(--text);
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .answer-box.visible { display: block; }

    .score {
      text-align: center;
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .score-number {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      color: white;
      font-size: 34px;
      font-weight: 900;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 30;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      padding: 12px 18px;
      border-radius: 999px;
      background: #111827;
      color: white;
      box-shadow: var(--shadow);
      transition: opacity .2s, transform .2s;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%);
    }

    footer {
      padding-top: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    @media (max-width: 800px) {
      .shell { width: min(100% - 22px, 1180px); padding-top: 14px; }
      .intro { padding: 22px; }
      .toolbar { grid-template-columns: 1fr; }
      .select { min-height: 46px; }
      .bank { grid-template-columns: 1fr; }
      .actions { width: 100%; }
      .actions .btn { flex: 1; }
      .modal-foot { flex-wrap: wrap; }
      .modal-card { height: 94vh; }
    }

    @media (max-width: 520px) {
      .brand { font-size: 22px; }
      .brand-mark { width: 40px; height: 40px; }
      .intro {
        grid-template-columns: 1fr;
        justify-items: start;
        gap: 14px;
      }
      .hero-logo { width: 72px; height: 72px; }
      .intro p { font-size: 16px; }
      .course-head { padding: 15px; }
      .bank-list { padding: 0 12px 14px; }
      .bank { padding: 13px; }
      .modal-body { padding: 16px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-mark" src="./assets/icon.png" alt="">
        <span>AskBank</span>
      </div>
      <button class="icon-btn" id="themeToggle" type="button" title="تبديل الوضع">☾</button>
    </header>

    <section class="hero" aria-label="ملخص مكتبة البنوك">
      <div class="intro">
        <img class="hero-logo" src="./assets/icon.png" alt="AskBank">
        <div class="intro-copy">
          <div class="eyebrow">مكتبة بنوك أسئلة فقط</div>
          <h1>تحميل تطبيق AskBank</h1>
          <p>حمّل التطبيق على جهازك، أو استخدم نسخة الموقع الخفيفة لتصفح البنوك والتدريب مباشرة من المتصفح.</p>
          <div class="hero-actions">
            <a class="btn primary" href="./AskBank_v4.apk" download>تحميل APK</a>
            <span class="pill">حوالي 48 ميجابايت</span>
          </div>
        </div>
      </div>
    </section>

    <section class="toolbar" aria-label="أدوات البحث والتصفية">
      <label class="search-wrap">
        <span aria-hidden="true">⌕</span>
        <input id="searchInput" type="search" placeholder="ابحث باسم المادة أو البنك">
      </label>
      <select class="select" id="typeFilter" aria-label="تصفية نوع البنك">
        <option value="all">كل الأنواع</option>
        <option value="multiple_choice">اختيار من متعدد</option>
        <option value="essay">إنشائي</option>
      </select>
    </section>

    <section class="courses" id="courses" aria-label="قائمة البنوك"></section>
    <div class="empty" id="emptyState">لا توجد بنوك تطابق البحث الحالي.</div>

    <footer>حقوق النشر © 2026. برمجة وتطوير: محمد المعايطه</footer>
  </main>

  <section class="modal" id="quizModal" aria-modal="true" role="dialog">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title" id="quizTitle">اختبار</div>
        <button class="icon-btn" type="button" onclick="closeQuiz()" title="إغلاق">×</button>
      </div>
      <div class="modal-body" id="quizBody"></div>
      <div class="modal-foot" id="quizFoot"></div>
    </div>
  </section>

  <div class="toast" id="toast"></div>

    const state = {
      questions: [],
      bank: null,
      index: 0,
      answers: {},
      mode: "standard",
      revealed: false,
      score: 0,
      complete: false
    };

    const $ = (selector) => document.querySelector(selector);
    const coursesEl = $("#courses");
    const emptyEl = $("#emptyState");
    const searchInput = $("#searchInput");
    const typeFilter = $("#typeFilter");

    function typeLabel(type) {
      return type === "essay" ? "إنشائي" : "اختيار من متعدد";
    }

    function renderCourses() {
      const term = searchInput.value.trim().toLowerCase();
      const filter = typeFilter.value;
      let visibleCourses = 0;

      coursesEl.innerHTML = BANKS.map((course, courseIndex) => {
        const files = course.files.filter(file => {
          const matchesType = filter === "all" || file.type === filter;
          const haystack = `${course.name} ${file.title} ${file.name}`.toLowerCase();
          return matchesType && (!term || haystack.includes(term));
        });

        if (!files.length) return "";
        visibleCourses += 1;

        const questionCount = files.reduce((sum, file) => sum + file.questions, 0);
        const openClass = term || visibleCourses === 1 ? " open" : "";
        const items = files.map(file => `
          <article class="bank">
            <div class="bank-main">
              <div class="bank-title">${file.title}</div>
              <div class="meta">
                <span class="pill">${file.questions} سؤال</span>
                <span class="pill ${file.type === "essay" ? "essay" : ""}">${typeLabel(file.type)}</span>
                <span class="pill">${file.name}</span>
              </div>
            </div>
            <div class="actions">
              <button class="btn primary" type="button" onclick='loadQuiz(${JSON.stringify(file)})'>تدرب</button>
              <a class="btn secondary" href="${encodeURI(file.path)}" download>تحميل</a>
            </div>
          </article>
        `).join("");

        return `
          <article class="course${openClass}" data-course="${courseIndex}">
            <button class="course-head" type="button" onclick="toggleCourse(this)">
              <span class="course-title">
                <strong>${course.name}</strong>
                <span>${files.length} بنك، ${questionCount} سؤال</span>
              </span>
              <span class="chevron">⌄</span>
            </button>
            <div class="bank-list">${items}</div>
          </article>
        `;
      }).join("");

      emptyEl.style.display = visibleCourses ? "none" : "block";
    }

    function toggleCourse(button) {
      button.closest(".course").classList.toggle("open");
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1900);
    }

    async function loadQuiz(bank) {
      try {
        const response = await fetch(bank.path);
        if (!response.ok) throw new Error("load failed");
        const data = await response.json();
        const rawQuestions = Array.isArray(data.questions) ? data.questions : [];
        state.questions = rawQuestions.map((q, index) => ({
          id: q.id ?? index,
          text: q.text ?? "",
          options: Array.isArray(q.options) ? q.options : [],
          correctAnswer: Number.isInteger(q.correctAnswer) ? q.correctAnswer : 0,
          modelAnswer: q.modelAnswer ?? ""
        }));
        if (!state.questions.length) {
          showToast("هذا البنك لا يحتوي على أسئلة.");
          return;
        }
        state.bank = {...bank, title: data.title || bank.title, type: data.type || bank.type};
        state.index = 0;
        state.answers = {};
        state.mode = "standard";
        state.revealed = false;
        state.score = 0;
        state.complete = false;
        $("#quizModal").classList.add("active");
        document.body.classList.add("quiz-open");
        if (state.questions.every(isEssayQuestion)) {
          state.mode = "essay";
          renderQuestion();
        } else {
          renderModeSelection();
        }
      } catch (error) {
        console.error(error);
        showToast("تعذر تحميل ملف البنك.");
      }
    }

    function isEssayQuestion(question) {
      return state.bank.type === "essay" || (!question.options.length && Boolean(question.modelAnswer));
    }

    function renderScorePill() {
      return `<span class="pill score-pill">النقاط: ${calculateScore()}</span>`;
    }

    function shouldShowLiveScore() {
      return state.mode === "instant" || state.mode === "essay";
    }

    function calculateScore() {
      return state.questions.reduce((total, question) => {
        const answer = state.answers[question.id];
        if (answer === undefined) return total;
        if (isEssayQuestion(question)) return total + (answer === 1 ? 1 : 0);
        return total + (answer === question.correctAnswer ? 1 : 0);
      }, 0);
    }

    function renderModeSelection() {
      $("#quizTitle").textContent = state.bank.title;
      $("#quizBody").innerHTML = `
        <div class="mode-selection">
          <div class="meta">
            <span class="pill">${state.questions.length} سؤال</span>
          </div>
          <h2>اختر طريقة التدريب</h2>
          <button class="mode-card" type="button" onclick="startQuiz('instant')">
            <strong>الوضع الفوري</strong>
            <span>اختر إجابة واحدة، تظهر النتيجة فورًا، ولا يمكنك تغييرها بعد الاختيار.</span>
          </button>
          <button class="mode-card" type="button" onclick="startQuiz('standard')">
            <strong>الوضع العادي</strong>
            <span>اختر إجابتك ويمكنك تغييرها، ولا تظهر الصحة أو النقاط إلا عند إنهاء الاختبار.</span>
          </button>
        </div>
      `;
      $("#quizFoot").innerHTML = `
        <button class="btn ghost" type="button" onclick="closeQuiz()">إغلاق</button>
        <span class="pill">اختر نمط التدريب</span>
      `;
    }

    function startQuiz(mode) {
      state.mode = mode;
      state.index = 0;
      state.answers = {};
      state.revealed = false;
      state.score = 0;
      state.complete = false;
      renderQuestion();
    }

    function renderQuestion() {
      const question = state.questions[state.index];
      $("#quizTitle").textContent = state.bank.title;
      if (state.complete) {
        renderScore();
        return;
      }

      const essay = isEssayQuestion(question);
      const answer = state.answers[question.id];
      const progress = `${state.index + 1} / ${state.questions.length}`;

      $("#quizBody").innerHTML = `
        <div class="question">
          <div class="meta">
            <span class="pill">${progress}</span>
            <span class="pill ${essay ? "essay" : ""}">${essay ? "سؤال إنشائي" : "اختيار من متعدد"}</span>
            ${shouldShowLiveScore() ? renderScorePill() : ""}
          </div>
          <h2>س ${state.index + 1}: ${question.text}</h2>
          ${essay ? renderEssay(question, answer) : renderOptions(question, answer)}
        </div>
      `;

      $("#quizFoot").innerHTML = `
        <button class="btn ghost" type="button" onclick="prevQuestion()" ${state.index === 0 ? "disabled" : ""}>السابق</button>
        ${shouldShowLiveScore() ? renderScorePill() : `<span class="pill">${progress}</span>`}
        <button class="btn primary" type="button" onclick="nextQuestion()">${state.index === state.questions.length - 1 ? "عرض النتيجة" : "التالي"}</button>
      `;
    }

    function renderOptions(question, answer) {
      const isInstant = state.mode === "instant";
      const isAnswered = answer !== undefined;
      return `
        <div class="options">
          ${question.options.map((option, index) => {
            const isCorrect = index === question.correctAnswer;
            const isWrong = isInstant && isAnswered && answer === index && !isCorrect;
            const className = [
              "option",
              answer === index ? "selected" : "",
              isInstant && isAnswered && isCorrect ? "correct" : "",
              isWrong ? "wrong" : ""
            ].filter(Boolean).join(" ");
            return `<button class="${className}" type="button" onclick="selectOption(${index})" ${isInstant && isAnswered ? "disabled" : ""}>${option}</button>`;
          }).join("")}
        </div>
      `;
    }

    function renderEssay(question, answer) {
      const revealedClass = state.revealed ? " visible" : "";
      const evaluated = answer !== undefined;
      return `
        <button class="btn secondary" type="button" onclick="revealEssayAnswer()" ${state.revealed ? "disabled" : ""}>إظهار الإجابة النموذجية</button>
        <div class="answer-box${revealedClass}">${question.modelAnswer || "لا توجد إجابة نموذجية في هذا السؤال."}</div>
        ${state.revealed ? `
          <div class="actions">
            <button class="btn success ${answer === 1 ? "selected" : ""}" type="button" onclick="gradeEssay(1)">إجابتي صحيحة</button>
            <button class="btn danger ${answer === 0 ? "selected" : ""}" type="button" onclick="gradeEssay(0)">إجابتي خاطئة</button>
          </div>
        ` : ""}
        ${evaluated ? `<span class="pill ${answer === 1 ? "" : "essay"}">${answer === 1 ? "تم احتسابها صحيحة" : "تم احتسابها خاطئة"}</span>` : ""}
      `;
    }

    function selectOption(index) {
      const question = state.questions[state.index];
      if (state.mode === "instant" && state.answers[question.id] !== undefined) return;
      state.answers[question.id] = index;
      renderQuestion();
    }

    function revealEssayAnswer() {
      state.revealed = true;
      renderQuestion();
    }

    function gradeEssay(value) {
      const question = state.questions[state.index];
      state.answers[question.id] = value;
      renderQuestion();
    }

    function nextQuestion() {
      const question = state.questions[state.index];
      if (state.answers[question.id] === undefined) {
        showToast(isEssayQuestion(question) ? "أظهر الإجابة ثم قيّم نفسك للمتابعة." : "اختر إجابة للمتابعة.");
        return;
      }
      if (state.index < state.questions.length - 1) {
        state.index += 1;
        state.revealed = false;
        renderQuestion();
      } else {
        state.complete = true;
        renderScore();
      }
    }

    function prevQuestion() {
      if (state.index === 0) return;
      state.index -= 1;
      const question = state.questions[state.index];
      state.revealed = state.answers[question.id] !== undefined && isEssayQuestion(question);
      renderQuestion();
    }

    function renderScore() {
      const score = calculateScore();
      const percent = Math.round((score / state.questions.length) * 100);
      $("#quizBody").innerHTML = `
        <div class="score">
          <div class="score-number">${percent}%</div>
          <h2>انتهى التدريب</h2>
          <p>حصلت على ${score} من ${state.questions.length}.</p>
        </div>
      `;
      $("#quizFoot").innerHTML = `
        <button class="btn ghost" type="button" onclick="closeQuiz()">إغلاق</button>
        <button class="btn primary" type="button" onclick="restartQuiz()">إعادة التدريب</button>
      `;
    }

    function restartQuiz() {
      state.index = 0;
      state.answers = {};
      state.revealed = false;
      state.score = 0;
      state.complete = false;
      renderQuestion();
    }

    function closeQuiz() {
      $("#quizModal").classList.remove("active");
      document.body.classList.remove("quiz-open");
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      $("#themeToggle").textContent = theme === "dark" ? "☼" : "☾";
      localStorage.setItem("askbank-theme", theme);
    }

    $("#themeToggle").addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme") || "light";
      applyTheme(current === "dark" ? "light" : "dark");
    });

    searchInput.addEventListener("input", renderCourses);
    typeFilter.addEventListener("change", renderCourses);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeQuiz();
    });

    applyTheme(localStorage.getItem("askbank-theme") || "dark");
    renderCourses();
  </script>
</body>
</html>
